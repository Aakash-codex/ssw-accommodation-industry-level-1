    {s:"日本の宿泊施設ではチップを受け取ることが一般的な慣習である。",ans:false,exp:"日本にはチップ文化がありません。 / जापानमा टिप दिने/लिने संस्कृति छैन।"},
    {s:"客室に入る際はお客様の許可なく自由に入室してよい。",ans:false,exp:"必ずノック・呼び鈴で許可を得てから入室します。 / अनुमति बिना प्रवेश गर्न मिल्दैन।"},
    {s:"一般的なチェックイン時間は14時または15時である。",ans:true,exp:"一般的な時間設定です。 / सामान्य चेक-इन समय हो।"},
    {s:"ノーショーとは、予約したにも関わらず来館しないことを指す。",ans:true,exp:"No Showの定義です。 / नो-शोको परिभाषा।"},
    {s:"会計時は支払い前に領収書を発行するのが正しい手順である。",ans:false,exp:"支払い後に領収書を発行します。 / भुक्तान पछि रसिद दिनु सही क्रम हो।"},
    {s:"コンシェルジュは小規模な宿泊施設ではフロントが兼務する場合がある。",ans:true,exp:"テキストに明記されています。 / साना होटलमा फ्रन्ट स्टाफले यो काम पनि गर्छ।"},
    {s:"お客様が館内でご利用したサービスは「館内利用」として会計時に確認する必要がある。",ans:true,exp:"チェックアウト時の必須確認事項です。 / चेक-आउटमा जाँच्नुपर्ने महत्त्वपूर्ण कुरा।"},
    {s:"キャンセル料はスタッフが自由に設定してよい。",ans:false,exp:"宿泊施設のキャンセルポリシーに従います。 / होटलको रद्द नीति अनुसार मात्र।"},
  ],
  sit:[
    {q:"お客様から「今日チェックインできる部屋はありますか？」と電話がありました。空室の確認方法として正しいのはどれですか？",opts:["感覚で空いていると答える","システムまたは予約台帳で空室を確認してから回答する","フロントマネージャーに転送する","「いつでも空いています」と答える"],ans:1,exp:"必ず空室状況をシステムで確認してから正確な情報を提供します。 / सिस्टममा जाँचेर मात्र सही जानकारी दिनुपर्छ।"},
    {q:"チェックイン時に予約が見つからないとお客様が主張しています。どう対応しますか？",opts:["「予約はありません」と断る","お客様の名前・電話番号・予約日で再検索し、見つからない場合は上司に報告する","お客様の言葉を信じてすぐに部屋を提供する","別のホテルを紹介する"],ans:1,exp:"複数の方法で再確認し、解決できない場合は上司に引き継ぎます。 / पुनः खोजी गरी भेटिएन भने वरिष्ठलाई जानकारी दिनु।"},
    {q:"お客様が希望するお部屋が満室の場合、どのように対応しますか？",opts:["「ありません」とだけ伝える","代替の部屋を提案するか、次回の予約を受け付ける","他のホテルに電話する","お客様が帰るまで待つ"],ans:1,exp:"代替案の提示が適切なサービスです。 / विकल्प प्रस्ताव गर्नु उत्तम सेवा हो।"},
    {q:"チェックアウトの際にお客様の会計に誤りを発見しました。どうしますか？",opts:["誤りを無視してそのまま請求する","すぐにお客様にお詫びして正しい金額で再精算する","後日メールで訂正を知らせる","マネージャーの許可を得てから訂正する"],ans:1,exp:"すぐにお詫びして正確な会計をやり直します。迅速な対応が重要です。 / तुरुन्त माफी मागेर सही भुक्तान गर्नुपर्छ।"},
    {q:"お客様から「部屋の金庫の開け方がわからない」と電話がありました。どう対応しますか？",opts:["「取扱説明書を読んでください」と伝える","丁寧に操作方法を説明し、それでも解決しない場合はスタッフを部屋に派遣する","「故障です」と答える","ハウスキーパーに転送する"],ans:1,exp:"まず電話で説明し、解決しなければ直接対応します。 / पहिले फोनमा बुझाउनु, समाधान नभए कोठामा जानु।"},
    {q:"深夜にチェックインするお客様が来ました。予約はありますが担当者が不在です。どうしますか？",opts:["「明日来てください」と伝える","夜間対応マニュアルに従ってチェックイン手続きを行う","お客様を外で待たせる","すぐにマネージャーを呼ぶ"],ans:1,exp:"夜間対応マニュアルに従い、適切なチェックイン対応を行います。 / रात्रि सञ्चालन नियम अनुसार चेक-इन प्रक्रिया पूरा गर्नुपर्छ।"},
    {q:"お客様が「チェックアウトを延長したい」とリクエストしました。どう対応しますか？",opts:["断る","空室状況を確認し、可能であれば延長料金を説明した上で対応する","無料で延長を許可する","他のスタッフに任せる"],ans:1,exp:"空室確認後、延長料金を説明してから対応します。 / खाली कोठा जाँचेर अतिरिक्त शुल्क बताएर व्यवस्था गर्नुपर्छ।"},
    {q:"チェックイン時に、お客様が「朝食は含まれていますか？」と質問しました。",opts:["「含まれています」と答える","予約内容を確認してから正確に答える","「含まれていません」と答える","「フロントマネージャーに聞いてください」と答える"],ans:1,exp:"予約内容を必ず確認してから正確な情報を提供します。 / आरक्षण विवरण जाँचेर सही उत्तर दिनुपर्छ।"},
    {q:"お客様が忘れ物をしたと連絡してきました。どう対応しますか？",opts:["「わかりません」と伝える","宿泊日と予約者名を確認し、落とし物を確認して適切に対応する","すぐに捨てる","他のスタッフに任せる"],ans:1,exp:"宿泊日と氏名で特定し、忘れ物を確認して連絡します。 / बसेको मिति र नाम जाँचेर हराएको सामान खोज्नुपर्छ।"},
    {q:"お客様が部屋でタバコを吸ったことを発見しました（禁煙室）。どう対応しますか？",opts:["無視する","施設のルールに従い、追加料金の請求または適切な対応をとる","即時退室を求める","警察を呼ぶ"],ans:1,exp:"施設ルールに従い、追加清掃費等を請求します。 / होटलको नियम अनुसार अतिरिक्त सफाई शुल्क लिइन्छ।"},
  ]
},
ch2:{
  title:"02 企画・広報",
  titleNp:"योजना र जनसम्पर्क",
  stars:"★★ Very Frequently Asked",
  summary:`<div class="jp">企画業務は宿泊プランやイベントの開発。広報業務は自社の情報発信（ホームページ・SNS）。重要用語として稼働率（OCC）、ADR、RevPAR、OTA、FIT、ダイナミックプライシングなどを覚える。</div>
<div class="np">योजना: आवास प्लान र कार्यक्रम विकास। जनसम्पर्क: वेबसाइट र SNS मार्फत सूचना प्रवाह। OCC, ADR, RevPAR, OTA, FIT — महत्त्वपूर्ण शब्दावली।</div>`,
  keyPoints:[
    {star:"★★★",jp:"稼働率（OCC）= 予約室数 ÷ 総室数 × 100",np:"OCC = बुक कोठा ÷ कुल कोठा × 100"},
    {star:"★★★",jp:"ADR = 客室売上合計 ÷ 稼働している客室数（客室一室の平均単価）",np:"ADR = कुल आय ÷ भरिएका कोठाहरू (प्रति कोठा औसत मूल्य)"},
    {star:"★★",jp:"RevPAR = OCC × ADR（販売可能な客室1室あたりの収益）",np:"RevPAR = OCC × ADR"},
    {star:"★★★",jp:"OTA = Online Travel Agent（インターネット旅行代理店）",np:"OTA = अनलाइन ट्राभल एजेन्ट"},
    {star:"★★",jp:"FIT = Free Independent Traveler（個人旅行者）",np:"FIT = स्वतन्त्र व्यक्तिगत यात्री"},
    {star:"★★",jp:"ダイレクトブッキング = OTAを通さず直接予約（手数料削減）",np:"डाइरेक्ट बुकिङ = OTA बिना सिधा बुकिङ (कमिसन बचत)"},
    {star:"★",jp:"口コミ（くちコミ）は集客に大きな力となる",np:"मुखमुख प्रचार ग्राहक आकर्षणमा शक्तिशाली हुन्छ"},
  ],
  mcq:[
    {q:"100部屋の宿泊施設で70部屋が予約されている場合、稼働率（OCC）はいくつですか？",opts:["50%","60%","70%","80%"],ans:2,exp:"OCC = 70 ÷ 100 × 100 = 70%。公式：予約室数 ÷ 総室数 × 100。 / OCC = 70 ÷ 100 × 100 = 70%।"},
    {q:"ADR（Average Daily Rate）の説明として正しいのは？",opts:["全客室の予約率","客室一室あたりの平均販売単価","1日の総売上","全スタッフの平均給与"],ans:1,exp:"ADR = 客室売上合計 ÷ 稼働客室数。収益管理の重要指標です。 / ADR = कुल कोठा आय ÷ भरिएका कोठाहरू।"},
    {q:"OTA（Online Travel Agent）の説明として正しいのは？",opts:["オフラインの旅行会社","インターネットを介した旅行商品・サービスを提供するオンライン旅行代理店","宿泊施設の直接予約サイト","政府観光局"],ans:1,exp:"OTA = Online Travel Agent。楽天トラベル、じゃらん等が代表例です。 / OTA = अनलाइन ट्राभल एजेन्ट।"},
    {q:"ダイレクトブッキングのメリットとして正しいのは？",opts:["手数料が増える","旅行会社や OTA の手数料負担を減らすことができる","予約が増える保証がある","外国人客が増える"],ans:1,exp:"中間業者を通さないため手数料コストを削減できます。 / बिचौलिया नभएकाले कमिसन बच्छ।"},
    {q:"RevPARの計算式として正しいのは？",opts:["総売上 ÷ スタッフ数","OCC × ADR","ADR ÷ OCC","総客室数 × 宿泊日数"],ans:1,exp:"RevPAR = OCC（稼働率）× ADR（平均単価）で算出します。 / RevPAR = OCC × ADR।"},
    {q:"FIT（Free Independent Traveler）の説明として正しいのは？",opts:["旅行会社のツアー参加者","自由な個人旅行者","外国人観光客全般","ビジネス旅行者"],ans:1,exp:"FIT = 個人で旅行を計画・実行する自由旅行者です。 / FIT = स्वतन्त्र व्यक्तिगत यात्री।"},
    {q:"宿泊施設のSNS運用で最も重要でないものはどれですか？",opts:["定期的な投稿","お客様からのコメントへの返信","競合他社の悪口を書く","地域との連携"],ans:2,exp:"競合他社の悪口はブランドイメージを損ない、絶対に避けるべきです。 / प्रतिस्पर्धीको बारेमा नकारात्मक लेख्नु होटलको छवि बिगार्छ।"},
    {q:"「口コミ」（くちコミ）とは何ですか？",opts:["SNS広告","お客様自身が体験を発信するレビュー・評価","公式ホームページ","テレビCM"],ans:1,exp:"口コミはお客様の自発的な体験発信で、集客力が高いです。 / मुखमुख प्रचार अतिथिको स्वयंसेवी समीक्षा हो।"},
    {q:"「１泊２食」プランの説明として正しいのは？",opts:["朝食のみ含まれる","夕食と朝食が含まれる","食事は含まれない","昼食のみ含まれる"],ans:1,exp:"１泊２食 = 夕食＋朝食込み。主に旅館で販売されます。 / एक रात दुई खाना = रात्रिभोज + बिहानी खाना।"},
    {q:"ダイナミックプライシングの目的として正しいのは？",opts:["常に最低価格を維持する","予約状況や空室状況に応じて価格を変動させ収益を最大化する","固定価格で安定させる","競合他社と同じ価格にする"],ans:1,exp:"需要に応じて価格を最適化する戦略です。 / माग अनुसार मूल्य परिवर्तन गरी आय बढाउने रणनीति।"},
    {q:"ウェブサイトのSEO対策として正しいのは？",opts:["画像を大量に載せる","適切なキーワードの使用とコンテンツの質向上","毎日デザインを変える","他社サイトをコピーする"],ans:1,exp:"SEO = 検索エンジン最適化。適切なキーワードが重要です。 / SEO को लागि सही किवर्ड र गुणस्तरयुक्त सामग्री महत्त्वपूर्ण छ।"},
    {q:"ベッド＆ブレックファースト（B＆B）の説明として正しいのは？",opts:["朝食と夕食が含まれる","朝食のみ含まれる","食事は含まれない","昼食のみ含まれる"],ans:1,exp:"B&B = 朝食のみ。主にホテルで販売されます。 / B&B = बिहानी खाना मात्र सामेल।"},
    {q:"稼働率が「オンシーズン」に上がり「オフシーズン」に下がる理由は何ですか？",opts:["スタッフの数が変わるから","長期休暇や大型連休での旅行需要が高まるから","価格が変動するから","施設が拡大するから"],ans:1,exp:"GWや夏休みなどの長期休暇は旅行需要が増し稼働率が上がります。 / लामो बिदामा पर्यटन माग बढेर OCC बढ्छ।"},
    {q:"「レピーター（リピーター）」とは何ですか？",opts:["初めての来館者","過去に利用し何度も再利用する顧客","クレームをする顧客","VIP顧客"],ans:1,exp:"リピーターは何度も来館する常連客です。 / रिपिटर = बारम्बार आउने नियमित अतिथि।"},
    {q:"ウォークイン（Walk-in）の説明として正しいのは？",opts:["予約なしに直接来館してサービスを利用すること","事前予約のこと","チェックアウトのこと","ツアー客のこと"],ans:0,exp:"ウォークインは予約なしの直接来館です。 / वाक-इन = अग्रिम बुकिङ बिना सिधा आउने।"},
    {q:"宿泊施設のホームページにオンライン予約システムを導入するメリットは？",opts:["スタッフが増える","OTAなどの手数料を減らし直接予約を増やせる","予約数が必ず増える","価格を隠せる"],ans:1,exp:"直接予約増加 → 中間手数料削減 = 収益改善。 / प्रत्यक्ष बुकिङ बढे कमिसन कम हुन्छ।"},
    {q:"「オールインクルーシブ」プランに一般的に含まれるものは？",opts:["客室のみ","宿泊料金＋飲料・軽食・アクティビティ","朝食のみ","夕食のみ"],ans:1,exp:"オールインクルーシブは全サービスが料金に含まれます。 / अल-इन्क्लुसिव = सबै सेवा शुल्कमा सामेल।"},
    {q:"インバウンド客（海外からの訪問者）に対するマーケティングで効果的なプランは？",opts:["和食のみのプラン","宿泊＋地域の日本文化体験プラン","ビジネス向けプランのみ","割引価格だけを強調する"],ans:1,exp:"文化体験のバンドルは海外客に強く訴求します。 / संस्कृति अनुभव समावेश प्लान विदेशी पर्यटकलाई आकर्षक हुन्छ।"},
    {q:"SNS運用で「お客様生成コンテンツ」を活用する方法として正しいのは？",opts:["お客様の投稿を勝手に削除する","お客様が投稿した写真やレビューを積極的に活用しハッシュタグなどで促進する","SNSを使わない","競合他社の投稿をコピーする"],ans:1,exp:"UGC（ユーザー生成コンテンツ）活用は宣伝効果が高い手法です。 / अतिथिको पोस्ट र समीक्षा प्रयोग गर्नु प्रभावशाली प्रचार हो।"},
    {q:"「デポジット（預り金）」の説明として正しいのは？",opts:["宿泊料金の全額","サービス利用を保証するために支払われる金額","チップのこと","返金不可の手数料"],ans:1,exp:"デポジットはサービス保証として先払いされる預かり金です。 / डिपोजिट = सेवा ग्यारेन्टीको लागि अग्रिम भुक्तान।"},
  ],

    {s:"ADRは「販売可能な客室1室あたりの収益」を示す指標である。",ans:false,exp:"ADRは客室一室の平均販売単価。RevPARが販売可能な客室1室あたりの収益です。 / ADR = औसत दैनिक दर; RevPAR = उपलब्ध कोठाको आय।"},
    {s:"OTA（Online Travel Agent）を通じた予約は施設側に手数料が発生する。",ans:true,exp:"OTAは仲介手数料を取ります。 / OTA ले कमिसन लिन्छ।"},
    {s:"ダイレクトブッキングとはOTAを通した予約のことである。",ans:false,exp:"ダイレクトブッキングはOTAを通さない直接予約です。 / डाइरेक्ट बुकिङ = बिचौलिया बिनाको सिधा बुकिङ।"},
    {s:"RevPARはOCC × ADRで計算される。",ans:true,exp:"正しい計算式です。 / RevPAR = OCC × ADR।"},
    {s:"B＆B（Bed & Breakfast）は朝食と夕食が含まれる宿泊プランである。",ans:false,exp:"B&Bは朝食のみです。 / B&B = बिहानी खाना मात्र।"},
    {s:"口コミは宿泊施設の集客に影響を与える。",ans:true,exp:"口コミは強力な集客ツールです。 / मुखमुख प्रचार शक्तिशाली माध्यम हो।"},

  sit:[
    {q:"お客様から「スタッフの態度が悪い」とクレームがありました。最初にどう対応しますか？",opts:["スタッフをその場で叱責する","まず不快な思いをさせたことをお詫びし、詳しい状況を確認する","「そんなことはない」と否定する","すぐに責任者を呼ぶ"],ans:1,exp:"クレーム対応の第一歩は必ずお詫びです。 / गुनासोको पहिलो कदम सधैँ माफी।"},
    {q:"館内でお客様が困っている様子でした。どう声をかけますか？",opts:["声をかけない","「何かお探しでしょうか」と声をかける","「どうしましたか？」とカジュアルに声をかける","スタッフを呼ぶ"],ans:1,exp:"「何かお探しでしょうか」が適切な接客表現です。 / 'के खोज्दै हुनुहुन्छ?' उपयुक्त सेवा वाक्य।"},
    {q:"お客様から「夕食はいりません」と言われました。予約時に夕食ありのプランだった場合どうしますか？",opts:["「それはできません」と断る","プランの内容を丁寧に説明し、変更が可能かどうか確認する","自動的に夕食を取り消す","無視する"],ans:1,exp:"プランの変更可否を丁寧に確認・説明します。 / प्लान परिवर्तन सम्भव छ कि छैन विनम्रतापूर्वक जाँच्नु।"},
    {q:"電話でクレームを受けました。電話を切るタイミングはいつですか？",opts:["クレームが解決したらすぐに切る","お客様が電話を切ってから切る","話が終わったと判断したら先に切る","一定時間が過ぎたら切る"],ans:1,exp:"電話は常にお客様が先に切るまで待ちます。 / अतिथिले पहिले काटेपछि मात्र।"},
    {q:"お客様に道順を案内する時、指の使い方として正しいのはどれですか？",opts:["人差し指一本で指す","手のひらを上に向けて4本の指をそろえて示す","ペンを持って指す","親指で指す"],ans:1,exp:"4本指・手のひら上向きが丁寧な案内作法です。 / 4 औँला मिलाई हत्केला माथि राखेर देखाउनु।"},
    {q:"お年寄りのお客様が到着しました。スムーズな対応として正しいのは？",opts:["通常通り素早く対応する","お声がけし、必要なサポートを確認しながら丁寧にゆっくりと対応する","別のスタッフに任せる","特に何もしない"],ans:1,exp:"お年寄りへのサポート確認と丁寧なゆっくりとした対応が大切です。 / बुजुर्ग अतिथिलाई विनम्र र बिस्तारै सेवा दिनु।"},
    {q:"新人スタッフがクレームを一人で解決しようとしています。あなたはどう助言しますか？",opts:["「頑張れ」と励ます","責任者に報告するよう伝え、一人で解決しようとしないよう助言する","無視する","クレームを引き受ける"],ans:1,exp:"クレームは必ず責任者に報告。一人抱え込みは厳禁です。 / गुनासो एकलाई सुल्झाउन नदिनु — व्यवस्थापकलाई भन्नु।"},
    {q:"盲導犬を連れたお客様が来館しました。正しい対応は？",opts:["盲導犬の入館を断る","盲導犬の受け入れを拒否せず通常の接客をする","ペット用の部屋を案内する","獣医に連絡する"],ans:1,exp:"盲導犬の受け入れを断ることは禁止されています。 / मार्गदर्शक कुकुर लिएर आएका अतिथिलाई प्रवेश दिनु अनिवार्य।"},
    {q:"お客様が館内のエレベーターを使おうとしています。スタッフも同乗する場合の対応は？",opts:["スタッフが先に乗る","常にお客様を優先してエレベーターに乗っていただく","「一緒には乗れません」と伝える","お客様に後から乗るよう伝える"],ans:1,exp:"エレベーターは常にお客様優先です。 / लिफ्टमा अतिथिलाई सधैँ प्राथमिकता दिनु।"},
    {q:"お客様から注文を受ける際、電話での注文確認として正しいのは？",opts:["メモしなくてよい","注文内容を繰り返して確認する","「わかりました」だけで終わる","他のスタッフに転送する"],ans:1,exp:"注文の繰り返し確認はミス防止の基本です。 / अर्डर दोहोर्‍याएर पुष्टि गर्नु गल्ती रोक्ने उपाय।"},
  ]
},
ch4:{
  title:"04 レストランサービス",
  titleNp:"रेस्टुरेन्ट सेवा",
  stars:"★★ Very Frequently Asked",
  summary:`<div class="jp">レストランサービスの基本動作・身だしなみ・食事提供・食のルール・アレルギー・安全衛生・専門用語。和食の提供順序と洋食のカトラリー配置は頻出。</div>
<div class="np">रेस्टुरेन्ट सेवाका आधार: मुद्रा, भेषभूषा, खाना परिवेशन, खाना नियम, एलर्जी, स्वच्छता र विशेषज्ञ शब्दावली। जापानी र पश्चिमी खानाको परिवेशन क्रम परीक्षामा महत्त्वपूर्ण।</div>`,
  keyPoints:[
    {star:"★★★",jp:"洋食：料理は左側から、飲み物は右側から提供する",np:"पश्चिमी खाना: खाना बाँयाबाट, पेय दाहिनाबाट परिवेशन"},
    {star:"★★★",jp:"和食提供順序：前菜→椀盛→お造り→焼物→煮物→揚物→酢の物→ごはん・香の物→水菓子",np:"जापानी खाना क्रम: जेन्साइ→वान्मोरि→ओत्सुकुरि→याकिमोनो→निमोनो→अगेमोनो→सुनोमोनो→गोहान/कोनोमोनो→मिजुगाशि"},
    {star:"★★★",jp:"食物アレルギー：予約時と来店時に必ず確認。アナフィラキシーショックは死に至る危険あり",np:"खाद्य एलर्जी: बुकिङ र आगमनमा अनिवार्य जाँच। एनाफिलेक्सिस ज्यानलाई खतरनाक"},
    {star:"★★",jp:"グラスを持つ際はコップの半分よりも下を持つ",np:"गिलास थाम्दा तल्लो आधाभन्दा मुनि समात्नु"},
    {star:"★",jp:"カトラリーは外側から順番に使用する（洋食）",np:"काँटाचक्कु बाहिरबाट क्रमशः प्रयोग गर्नु"},
    {star:"★★",jp:"ハラールとは：イスラム法に基づく食品・料理（豚肉・アルコール不使用）",np:"हलाल = इस्लामिक नियम अनुसारको खाना (सुँगुर र मदिरा रहित)"},
  ],
  mcq:[
    {q:"洋食でお料理を提供する際、正しい方向は？",opts:["右側から提供する","左側から提供する","どちら側でもよい","後ろから提供する"],ans:1,exp:"洋食は料理=左側から、飲み物=右側から提供が基本です。 / पश्चिमी खाना बाँयाबाट परिवेशन गर्नु।"},
    {q:"食物アレルギーへの対応として正しいのは？",opts:["お客様が申告しなければ確認不要","予約時と来店時に必ずアレルギーの有無を確認する","アレルギーは軽視してよい","メニュー表示のみで対応する"],ans:1,exp:"アレルギー確認は来店前・来店時の両方で必須です。 / बुकिङ र आगमन दुवैमा एलर्जी जाँच्नु अनिवार्य।"},
    {q:"和食のコース料理（懐石）で最初に提供するものは何ですか？",opts:["ご飯","前菜（ぜんさい）","デザート（水菓子）","お造り"],ans:1,exp:"懐石料理の基本提供順序は前菜から始まります。 / जापानी कोर्सको सुरुमा जेन्साइ (प्रवेशिका)।"},
    {q:"グラスを持つ際の正しい持ち方は？",opts:["グラスの上部を持つ","グラスの半分よりも下を持つ","グラスの縁を持つ","底を持つ"],ans:1,exp:"衛生的かつ安全のため、グラスの下半分を持ちます。 / गिलासको तल्लो आधाभन्दा तल समात्नु।"},
    {q:"「ハラール（Halal）」の説明として正しいのは？",opts:["ベジタリアン料理","イスラム法に基づいて許可された食品・料理（豚肉やアルコールを含まない）","グルテンフリー料理","乳製品不使用料理"],ans:1,exp:"ハラールはイスラム法（シャリーア）に適合した食品・調理法です。 / हलाल = इस्लामिक कानून अनुसारको खाना।"},
    {q:"洋食でナイフとフォークの食事中の置き方として正しいのは？",opts:["皿の外に置く","プレートの上に「ハ」の字になるように置く","ナプキンの上に置く","左右に分けて置く"],ans:1,exp:"食事中は「ハ」の字（八）にプレート上に置きます。食事終了後は右下に揃えます。 / खाना खाँदा प्लेटमाथि 'ह' आकारमा राख्नु।"},
    {q:"アナフィラキシーショックの説明として正しいのは？",opts:["軽い胃痛","重篤なアレルギー反応で呼吸困難など死に至る場合がある","軽いかゆみ","食欲不振"],ans:1,exp:"アナフィラキシーショックは緊急の医療対応が必要な重篤な反応です。 / एनाफिलेक्सिस = ज्यान जाने खतरनाक एलर्जी प्रतिक्रिया।"},
    {q:"レストランの清潔感で特に重要なのはどれですか？",opts:["高価な制服を着る","髪が食品に触れないよう管理し清潔なユニフォームを着用する","香水を多めにつける","ジュエリーを多く身につける"],ans:1,exp:"食品衛生の観点から髪の管理と清潔なユニフォームが必須です。 / खाद्य स्वच्छताका लागि कपाल व्यवस्थापन र सफा पोशाक अनिवार्य।"},
    {q:"「おもてなし」の英語の同意語として正しいのは？",opts:["Service","Hospitality","Etiquette","Customer care"],ans:1,exp:"「おもてなし」= Hospitality（ホスピタリティ）が同意語です。 / 'ओमोटेनाशि' = Hospitality।"},
    {q:"「一汁三菜（いちじゅうさんさい）」の説明として正しいのは？",opts:["3種類の汁と1種類のおかず","ご飯・汁・3つのおかずを組み合わせた和食の基本献立","3種類の肉料理","洋食のコース"],ans:1,exp:"一汁三菜は日本の食事の基本構成です。 / इचिजु सानसाइ = भात + सूप + ३ व्यञ्जन।"},
    {q:"食品を扱う際の手洗いについて正しいのは？",opts:["食事の前だけ洗う","食品を扱う前後やトイレ使用後などに定期的に手を洗いアルコール消毒も行う","一日に1回洗えばよい","水だけで洗う"],ans:1,exp:"食品衛生の基本として前後・トイレ後の手洗いが必須です。 / खाना अगाडि/पछाडि र शौचालय पछि साबुन र एल्कोहोलले हात धुनु।"},
    {q:"カトラリー（cutlery）の使用順序として正しいのは？",opts:["内側から順番に使う","外側から順番に使う","好きな順番で使う","デザート用を最初に使う"],ans:1,exp:"洋食のカトラリーは外側から内側へ順番に使います。 / काँटाचक्कु बाहिरबाट क्रमशः प्रयोग।"},
    {q:"レストランの閉店作業（へいてんさぎょう）に含まれるものは？",opts:["新しいメニューの作成","食器・備品の補充と整理整頓、テーブルのセッティング","料理の準備","予約の確認"],ans:1,exp:"閉店後は翌日の開店準備のため食器整理・テーブルセッティングが必要です。 / बन्द भएपछि भोलिको तयारीका लागि बर्तन र टेबल व्यवस्था।"},
    {q:"「配膳（はいぜん）」の説明として正しいのは？",opts:["食器を洗うこと","料理や飲み物をテーブルに運び適切に提供すること","メニューを作ること","予約を管理すること"],ans:1,exp:"配膳 = 料理・飲み物をテーブルに運ぶ行為です。 / हाइजेन = खाना/पेय टेबलमा लैजानु।"},
    {q:"「ソムリエ」の業務として正しいのは？",opts:["料理を調理する","ワインに関する専門的知識を持ちお客様に最適なワインを提案する","テーブルを清掃する","予約を管理する"],ans:1,exp:"ソムリエはワインの専門家です。 / सोम्मेलिए = वाइन विशेषज्ञ।"},
    {q:"開店準備（かいてんじゅんび）に含まれる重要な確認事項は？",opts:["スタッフの給与確認","テーブルセッティングの確認・食器備品の準備・調理場との情報確認","マーケティング計画の確認","SNSの確認"],ans:1,exp:"開店前はテーブル・食器・調理場との確認が必須です。 / खुल्नु अघि टेबल, बर्तन, रसोईको जाँच गर्नु।"},
    {q:"食品の保管に関して正しいのは？",opts:["どの食品も一緒に保管する","生の肉や魚は他の食品と分けて冷蔵・冷凍保存する","室温で全ての食品を保管する","使用期限を無視する"],ans:1,exp:"交差汚染防止のため生肉・魚は分けて保管が必須です。 / कच्चो मासु/माछा अन्य खानाबाट अलग राख्नु।"},
    {q:"「テイクアウト」の説明として正しいのは？",opts:["店内での食事","店内で食事をせずに料理を持ち帰ること","デリバリーサービス","コース料理"],ans:1,exp:"テイクアウト = 持ち帰り (take away)。 / टेक-अवे = बाहिर लैजाने।"},
    {q:"開店前の衛生管理として正しいのは？",opts:["手洗いは調理直前だけでよい","ハンドソープを使った手洗いに加えアルコールの手指消毒も行う","水だけで手を洗えばよい","手袋をすれば手洗い不要"],ans:1,exp:"ハンドソープ＋アルコール消毒の二重対策が必要です。 / साबुन र एल्कोहोल दुवैले हात सफाई।"},
    {q:"「ベジタリアン（Vegetarian）」料理の特徴として正しいのは？",opts:["魚のみを含む","肉を含まない料理・食事スタイル","豚肉を含まない","乳製品を含まない"],ans:1,exp:"ベジタリアンは肉不使用が特徴です。 / शाकाहारी = मासु नभएको खाना।"},
  ],
  tf:[
    {s:"洋食では料理は右側から、飲み物は左側から提供する。",ans:false,exp:"料理=左側、飲み物=右側が正しい。 / खाना बाँयाबाट, पेय दाहिनाबाट।"},
    {s:"食事終了後はナイフとフォークを揃えて右下に置くのが一般的である。",ans:true,exp:"洋食マナーの基本です。 / खाना सकिएपछि दाहिनातर्फ मिलाएर राख्नु।"},
    {s:"アナフィラキシーショックは軽い症状のため通常の対応でよい。",ans:false,exp:"緊急医療対応が必要な重篤な反応です。 / तुरुन्त चिकित्सा सहायता आवश्यक।"},
    {s:"ハラール料理には豚肉やアルコールが含まれていない。",ans:true,exp:"イスラム法に基づく食事制限です。 / हलालमा सुँगुर र मदिरा रहँदैन।"},
    {s:"和食の懐石料理で最初に提供するのはご飯である。",ans:false,exp:"最初は前菜（ぜんさい）です。 / पहिले जेन्साइ परिवेशन गर्नु।"},
    {s:"グラスはコップの半分よりも上を持つのが正しい。",ans:false,exp:"半分より下を持ちます。 / तल्लो आधाभन्दा मुनि समात्नु।"},
    {s:"食品を取り扱う前後は手を洗う必要がある。",ans:true,exp:"食品衛生の基本です。 / खाना हेरफेर अघि/पछि हात धुनु अनिवार्य।"},
    {s:"洋食のカトラリーは内側から外側へ順番に使う。",ans:false,exp:"外側から内側へ使います。 / बाहिरबाट भित्रतिर प्रयोग।"},
    {s:"「おもてなし」はEnglishでは「Hospitality」と同意語である。",ans:true,exp:"ホスピタリティが同意語です。 / ओमोटेनाशि = Hospitality।"},
    {s:"食物アレルギーの確認は来店時のみで十分である。",ans:false,exp:"予約時と来店時の両方で確認が必要です。 / बुकिङ र आगमन दुवैमा जाँच्नु।"},
  ],
  sit:[
    {q:"お客様が「ナッツアレルギーがある」と申告しました。どう対応しますか？",opts:["メニューを渡してお客様に確認してもらう","アレルギー情報を調理場とスタッフ全員で共有し、ナッツを含まない料理を提供する","「メニューを見てください」と言う","特に何もしない"],ans:1,exp:"アレルギー情報は必ずスタッフ全員と調理場で共有します。 / एलर्जी जानकारी सबै स्टाफ र रसोईलाई सुनाउनु।"},
    {q:"洋食コース料理でどの順番で提供しますか？",opts:["スープ→オードブル→魚→肉→デザート→コーヒー","オードブル→スープ→魚→肉→デザート→コーヒー","デザート→コーヒー→肉→魚→スープ→オードブル","肉→魚→スープ→オードブル→デザート→コーヒー"],ans:1,exp:"洋食コース：オードブル→スープ→魚→肉→デザート→コーヒーが基本順序です。 / पश्चिमी कोर्स क्रम।"},
    {q:"お客様の料理をテーブルに置く際にグラスが音を立ててしまいました。どう対応しますか？",opts:["無視する","すぐにお詫びし、以後静かに置くよう気をつける","「気にしないでください」と言う","お客様に謝らない"],ans:1,exp:"すぐにお詫びし、次回から注意します。 / तुरुन्त माफी र सुधार।"},
    {q:"レストランの開店前に必ず確認することは何ですか？",opts:["SNSの確認","テーブルセッティング・食器準備・調理場との情報確認","マーケティング計画","予約外のお客様の確認"],ans:1,exp:"開店前は必ず設備・食器・調理場確認が必要です。 / खुल्नु अघि टेबल, बर्तन, रसोईको जाँच।"},

    {q:"ドリンクをお客様のテーブルに置く際の注意点は？",opts:["素早く置けばよい","音を立てないように気をつけてゆっくり置く","グラスの上部を持って置く","左手で置く"],ans:1,exp:"音を立てずゆっくり置くのがサービスの基本マナーです。 / आवाज नगरी विस्तारै राख्नु।"},

  {q:"地図でお客様に道案内をする際の指の使い方として正しいのは？",opts:["人差し指一本で指す","手のひらを上に向けて4本の指をそろえて案内する","ペンで指す","親指で指す"],ans:1,ch:"Ch3"},
  {q:"開店前の準備として重要でないのはどれですか？",opts:["テーブルセッティングの確認","食器・備品の準備","調理場との情報確認","SNS投稿内容の確認"],ans:3,ch:"Ch4"},
  {q:"宿泊施設での避難訓練への参加が重要な理由は？",opts:["時間の有効活用","緊急時にお客様を安全に誘導できるようになるため","法律で全施設に義務付けられているから","スタッフの体力強化のため"],ans:1,ch:"Ch5"},
  {q:"「コンシェルジュ」業務の説明として正しいのは？",opts:["客室清掃専門","お客様が快適に過ごせるよう館内・館外の情報提供と手配を専門とする","料理提供専門","予約管理専門"],ans:1,ch:"Ch1"},
  {q:"ダイレクトブッキングの最大のメリットは？",opts:["予約数が必ず増える","OTA等の仲介手数料を削減できる","外国人客が増える","スタッフが増える"],ans:1,ch:"Ch2"},
  {q:"「申し訳ございません」はどのような場面で使いますか？",opts:["お客様を迎える時","お客様に申し訳ないことをした時やクレームを受けた時","注文を取る時","予約を受ける時"],ans:1,ch:"Ch3"},
  {q:"「ハラール（Halal）」料理の特徴として正しいのは？",opts:["ベジタリアン料理のこと","イスラム法に基づく食品・調理法で豚肉・アルコールを含まない","グルテンフリー料理","乳製品を含まない料理"],ans:1,ch:"Ch4"},
  {q:"お客様の安全確保で「盲導犬（もうどうけん）」に関して正しいのは？",opts:["ペット料金を請求する","絶対に入館を断ってはいけない","特別な部屋を用意する","ゲージに入れてもらう"],ans:1,ch:"Ch5"},
  {q:"チェックイン時に確認する「予約内容」として含まれないのはどれですか？",opts:["宿泊予約の有無","お客様の趣味・嗜好","お客様の氏名","ご予約のプラン"],ans:1,ch:"Ch1"},
  {q:"SNS運用で「分析ツール」を使う目的として正しいのは？",opts:["フォロワー数を減らすため","投稿の効果やフォロワーの動向を分析し戦略を改善するため","競合他社を監視するため","広告費を増やすため"],ans:1,ch:"Ch2"},
  {q:"「少々お待ちください（ませ）」はどのような場面で使いますか？",opts:["お客様が来店した時","お客様をお待たせする時","お詫びをする時","お客様がお帰りの時"],ans:1,ch:"Ch3"},
  {q:"レストランの清潔感として特に重要なのは？",opts:["高価な制服を着る","清潔なユニフォームを着用し髪が食品に触れないよう管理する","強い香水をつける","アクセサリーを多くつける"],ans:1,ch:"Ch4"},
  {q:"宿泊施設でのカビや害虫の発生防止のために確認すべきことは？",opts:["売上データ","毎日の天候（気温・湿度）","SNSの反応","スタッフの出勤状況"],ans:1,ch:"Ch5"},
];

let currentSection = 'overview';
let quizState = {};
let mockState = {answers:{}, submitted:false, score:0};

function showSection(s){
  currentSection = s;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.includes(getSectionLabel(s)));
  });
  render();
}

function getSectionLabel(s){
  const m={overview:'Overview',ch1:'Ch.1',ch2:'Ch.2',ch3:'Ch.3',ch4:'Ch.4',ch5:'Ch.5',top50:'Top 50',mock:'模擬'};
  return m[s]||s;
}

function render(){
  const c=document.getElementById('content');
  if(currentSection==='overview') c.innerHTML=renderOverview();
  else if(currentSection==='top50') c.innerHTML=renderTop50();
  else if(currentSection==='mock') c.innerHTML=renderMock();
  else c.innerHTML=renderChapter(currentSection);
}

function renderOverview(){
  return `<div class="chapter-card">
  <div class="chapter-title" style="font-size:18px">試験対策ガイド / Exam Strategy Guide</div>
  <div class="np" style="margin-top:8px">परीक्षा रणनीति गाइड</div>
  <div class="key-points" style="margin-top:12px">
  <p><strong>試験構成 / Exam Structure:</strong> 50問・マークシート方式・60分・合格点70%以上</p>
  <p><strong>重要度 / Star Guide:</strong> ★ = 出題予想、★★ = 頻出、★★★ = 最重要（必ず覚える）</p>
  <p><strong>尼泊爾語 / Nepali:</strong> ★★★ = अत्यन्त महत्त्वपूर्ण, ★★ = बारम्बार सोधिने, ★ = सम्भावित प्रश्न</p>
  <p>分野：フロント業務・企画広報・接客・レストランサービス・安全衛生管理</p>
  </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-top:1rem">
  ${['ch1','ch2','ch3','ch4','ch5'].map(k=>`
  <div class="chapter-card" style="cursor:pointer" onclick="showSection('${k}')">
  <div class="stars">${DATA[k].stars}</div>
  <div class="chapter-title" style="font-size:14px">${DATA[k].title}</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">${DATA[k].titleNp}</div>
  <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
  <span class="badge badge-blue">${DATA[k].mcq.length} MCQ</span>
  <span class="badge badge-green">${DATA[k].tf.length} T/F</span>
  <span class="badge badge-purple">${DATA[k].sit.length} Situation</span>
  </div>
  </div>`).join('')}
  </div>`;
}

function getQState(ch,type,i){
  const key=`${ch}_${type}_${i}`;
  if(!quizState[key]) quizState[key]={answered:false,selected:-1};
  return quizState[key];
}

function selectAnswer(ch,type,i,opt){
  const key=`${ch}_${type}_${i}`;
  if(quizState[key]&&quizState[key].answered) return;
  quizState[key]={answered:true,selected:opt};
  render();
}

function renderMCQ(ch,questions){
  return questions.map((q,i)=>{
    const st=getQState(ch,'mcq',i);
    let opts=q.opts.map((o,oi)=>{
      let cls='opt-btn';
      if(st.answered){
        if(oi===q.ans) cls+=' correct';
        else if(oi===st.selected) cls+=' wrong';
      }
      return `<button class="${cls}" onclick="selectAnswer('${ch}','mcq',${i},${oi})" ${st.answered?'disabled':''}>${['①','②','③','④'][oi]} ${o}</button>`;
    }).join('');
    return `<div class="q-block">
    <div class="q-num"><span class="badge badge-red">MCQ Q${i+1}</span></div>
    <div class="q-text">🏨 ${q.q}</div>
    <div class="q-options">${opts}</div>
    ${st.answered?`<div class="explanation">✅ <strong>正解：${q.opts[q.ans]}</strong><br>${q.exp}</div>`:''}
    </div>`;
  }).join('');
}

function selectTF(ch,i,ans){
  const key=`${ch}_tf_${i}`;
  if(quizState[key]&&quizState[key].answered) return;
  quizState[key]={answered:true,selected:ans};
  render();
}

function renderTF(ch,questions){
  return questions.map((q,i)=>{
    const st=getQState(ch,'tf',i);
    const tCls=st.answered?(q.ans===true?'tf-btn correct':'tf-btn wrong'):'tf-btn';
    const fCls=st.answered?(q.ans===false?'tf-btn correct':(st.selected===false?'tf-btn wrong':'tf-btn')):'tf-btn';
    return `<div class="q-block">
    <div class="q-num"><span class="badge badge-amber">T/F Q${i+1}</span></div>
    <div class="q-text">📋 ${q.s}</div>
    <div>
    <button class="${tCls}" onclick="selectTF('${ch}',${i},true)" ${st.answered?'disabled':''}>⭕ 正しい (True)</button>
    <button class="${fCls}" onclick="selectTF('${ch}',${i},false)" ${st.answered?'disabled':''}>❌ 正しくない (False)</button>
    </div>
    ${st.answered?`<div class="explanation">✅ <strong>正解：${q.ans?'⭕ 正しい':'❌ 正しくない'}</strong><br>${q.exp}</div>`:''}
    </div>`;
  }).join('');
}

function renderSit(ch,questions){
  return questions.map((q,i)=>{
    const st=getQState(ch,'sit',i);
    let opts=q.opts.map((o,oi)=>{
      let cls='opt-btn';
      if(st.answered){
        if(oi===q.ans) cls+=' correct';
        else if(oi===st.selected) cls+=' wrong';
      }
      return `<button class="${cls}" onclick="selectAnswer('${ch}','sit',${i},${oi})" ${st.answered?'disabled':''}>${['①','②','③','④'][oi]} ${o}</button>`;
    }).join('');
    return `<div class="q-block">
    <div class="q-num"><span class="badge badge-purple">Situation Q${i+1}</span></div>
    <div class="q-text">💼 ${q.q}</div>
    <div class="q-options">${opts}</div>
    ${st.answered?`<div class="explanation">✅ <strong>正解：${q.opts[q.ans]}</strong><br>${q.exp}</div>`:''}
    </div>`;
  }).join('');
}

function renderChapter(ch){
  const d=DATA[ch];
  if(!d) return '';
  const keyHtml=d.keyPoints.map(k=>`<p><span class="badge ${k.star.length>1?'badge-red':'badge-amber'}">${k.star}</span> <strong>${k.jp}</strong><br><span style="font-size:12px;color:var(--color-text-secondary)">${k.np}</span></p>`).join('');
  return `<div class="chapter-card">
  <div class="stars">${d.stars}</div>
  <div class="chapter-title">${d.title}</div>
  <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px">${d.titleNp}</div>
  ${d.summary}
  <div class="key-points" style="margin-top:12px"><div class="section-label">Key Points / 重要ポイント</div>${keyHtml}</div>
  </div>
  <div class="tab-row">
  <button class="tab active" id="tab-mcq-${ch}" onclick="showTab('${ch}','mcq')">📝 MCQ (20問)</button>
  <button class="tab" id="tab-tf-${ch}" onclick="showTab('${ch}','tf')">⭕❌ True/False (10問)</button>
  <button class="tab" id="tab-sit-${ch}" onclick="showTab('${ch}','sit')">💼 Situation (10問)</button>
  </div>
  <div id="q-area-${ch}">${renderMCQ(ch,d.mcq)}</div>`;
}

function showTab(ch,type){
  const d=DATA[ch];
  document.getElementById(`q-area-${ch}`).innerHTML=type==='mcq'?renderMCQ(ch,d.mcq):type==='tf'?renderTF(ch,d.tf):renderSit(ch,d.sit);
  document.querySelectorAll(`[id^=tab-][id$=-${ch}]`).forEach(t=>{t.classList.remove('active')});
  document.getElementById(`tab-${type}-${ch}`).classList.add('active');
}

function renderTop50(){
  return `<div class="chapter-card">
  <div class="chapter-title">最重要 Top 50 問 / Most Important Exam Questions</div>
  <div class="np">परीक्षामा सबैभन्दा बढी सोधिने ५० प्रश्नहरू</div>
  </div>
  ${TOP50.map(q=>`<div class="q-block">
  <div class="q-num"><span class="badge badge-red">Q${q.n}</span> <span class="badge badge-blue">${q.ch}</span> <span class="badge badge-amber">${q.star}</span></div>
  <div class="q-text">❓ ${q.q}</div>
  <div class="explanation">✅ <strong>${q.a}</strong></div>
  </div>`).join('')}`;
}

function selectMock(i,opt){
  if(mockState.submitted) return;
  mockState.answers[i]=opt;
  document.querySelectorAll(`[data-mock="${i}"]`).forEach((b,bi)=>{
    b.style.background = bi===opt ? 'var(--color-background-info)' : 'var(--color-background-primary)';
    b.style.borderColor = bi===opt ? 'var(--color-border-info)' : 'var(--color-border-tertiary)';
    b.style.color = bi===opt ? 'var(--color-text-info)' : 'var(--color-text-primary)';
  });
  const answered=Object.keys(mockState.answers).length;
  document.getElementById('mock-progress').style.width=(answered/50*100).toFixed(0)+'%';
  document.getElementById('mock-count').textContent=`${answered}/50 answered`;
}

function submitMock(){
  mockState.submitted=true;
  let sc=0;
  MOCK.forEach((q,i)=>{if(mockState.answers[i]===q.ans) sc++;});
  mockState.score=sc;
  render();
}

function resetMock(){
  mockState={answers:{},submitted:false,score:0};
  render();
}

function renderMock(){
  if(mockState.submitted){
    const sc=mockState.score;
    const pct=Math.round(sc/50*100);
    const pass=pct>=70;
    return `<div class="score-card">
    <div class="score-num" style="color:${pass?'var(--color-text-success)':'var(--color-text-danger)'}">${sc}/50</div>
    <div class="score-label">${pct}% — ${pass?'🎉 合格 (PASS) / उत्तीर्ण':'😅 不合格 (FAIL) — 再挑戦！/ पुनः प्रयास!'}</div>
    <div style="margin-top:1.5rem;font-size:13px;color:var(--color-text-secondary)">合格ライン：70%（35問以上正解） / उत्तीर्ण रेखा: 70%</div>
    <button class="btn-primary" style="margin-top:1rem" onclick="resetMock()">もう一度挑戦 / Try Again</button>
    </div>
    <div style="margin-top:1.5rem">
    ${MOCK.map((q,i)=>{
      const user=mockState.answers[i];
      const correct=user===q.ans;
      return `<div class="q-block" style="border-color:${correct?'#639922':'#A32D2D'}">
      <div class="q-num"><span class="badge ${correct?'badge-green':'badge-red'}">${correct?'✅ 正解':'❌ 不正解'} Q${i+1}</span> <span class="badge badge-blue">${q.ch}</span></div>
      <div class="q-text">${q.q}</div>
      <div style="font-size:13px;margin-top:6px">あなたの答え: <strong>${user!==undefined?q.opts[user]:'未回答 / No answer'}</strong></div>
      <div class="explanation">✅ 正解: <strong>${q.opts[q.ans]}</strong></div>
      </div>`;
    }).join('')}
    </div>`;
  }
  const answered=Object.keys(mockState.answers).length;
  return `<div class="chapter-card">
  <div class="chapter-title">模擬試験 / Mock Exam (50問)</div>
  <div class="np">अनुकरणीय परीक्षा (५० प्रश्न) — पास: ७०% वा माथि</div>
  </div>
  <div class="mock-header">
  <span class="mock-timer">⏱ 60分 / 60 minutes</span>
  <span class="mock-score" id="mock-count">${answered}/50 answered</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="mock-progress" style="width:${answered/50*100}%"></div></div>
  ${MOCK.map((q,i)=>{
    const sel=mockState.answers[i];
    return `<div class="q-block">
    <div class="q-num"><span class="badge badge-blue">Q${i+1}</span> <span class="badge badge-amber">${q.ch}</span></div>
    <div class="q-text">${q.q}</div>
    <div class="q-options">
    ${q.opts.map((o,oi)=>{
      const isSelected=sel===oi;
      return `<button class="opt-btn" data-mock="${i}" onclick="selectMock(${i},${oi})" style="${isSelected?'background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info);':''}">${['①','②','③','④'][oi]} ${o}</button>`;
    }).join('')}
    </div>
    </div>`;
  }).join('')}
  <div style="text-align:center;padding:1.5rem 0">
  <button class="btn-primary" onclick="submitMock()" style="padding:12px 32px;font-size:15px">提出・採点 / Submit & Score ↗</button>
  </div>`;
}

render();
</script>
